[project]
name = "tradeforge-db"
version = "0.1.0"
description = "Persistence: SQLAlchemy models and Alembic migrations, shared by the API, the collector and the executor."
requires-python = ">=3.12,<3.13"
license = "Apache-2.0"
dependencies = [
    # The domain vocabulary — Candle, Side, AssetClass, InstrumentSpec — is defined by
    # the engine, and the persistence layer conforms to it. The core owns the language;
    # the adapters speak it (ADR-0009). The dependency never points the other way.
    "tradeforge-engine",
    # The DSL is the source of truth for what a timeframe is. The database checks
    # against that list instead of keeping a second copy of it.
    "tradeforge-schema",
    "sqlalchemy>=2.0.36",
    "alembic>=1.14",
    "psycopg[binary]>=3.3.4",
    "pydantic-settings>=2.7",
]

[project.scripts]
tradeforge-db = "tradeforge_db.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tradeforge_db"]
# The migrations ship with the package: a deployed container must be able to run
# `tradeforge-db upgrade` without the repository checked out next to it.
artifacts = ["src/tradeforge_db/migrations/**"]

# Only for running the `alembic` CLI by hand from this directory, e.g.
#   uv run alembic -c packages/db/alembic.ini revision --autogenerate -m "add rsi params"
#
# The application never reads this file: it builds the config in code
# (`tradeforge_db.migrate.alembic_config`) so that a deployed container needs no
# ini file and no particular working directory. The database URL is deliberately
# absent here — it comes from the environment, like every other secret.

[alembic]
script_location = src/tradeforge_db/migrations
prepend_sys_path = src
path_separator = os

# `rev_` prefix, because a Python file whose name starts with a digit is not a valid
# module name — and mypy type-checks these files like any other code we ship.
file_template = rev_%%(rev)s_%%(slug)s

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

# A superseded run is wasted money and a misleading status. Cancel it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs opt in to more if they need it.
permissions:
  contents: read

env:
  # Every action below is pinned to a commit SHA, not a tag. Tags are mutable:
  # whoever owns the action can move v7 to point at different code tomorrow.
  GITLEAKS_VERSION: 8.30.1
  GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb

jobs:
  python:
    name: Python — lint, types, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      # --locked fails if uv.lock is stale relative to the pyprojects. It also
      # proves the Linux resolution works — the MT5 wheel does not exist here,
      # and its platform marker is what keeps that from being a problem (ADR-02).
      - name: Install workspace
        run: uv sync --locked

      - name: Ruff (lint)
        run: uv run ruff check --output-format=github .

      - name: Ruff (format)
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy

      - name: 'Pytest (coverage gate: 90%)'
        run: uv run pytest

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          flags: python
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  web:
    name: Web — lint, types, tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install (from lockfile)
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: 'Vitest (coverage gate: 90%)'
        run: npm run test:cov

      - name: Build
        run: npm run build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: apps/web/coverage/lcov.info
          flags: web
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  secrets:
    name: Secret scan (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # A secret is compromised the moment it exists in *any* commit, so the
          # whole history is the subject — not just this diff.
          fetch-depth: 0

      - name: Install gitleaks (pinned + checksum verified)
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL -o gitleaks.tar.gz "$url"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks

      - name: Scan
        run: ./gitleaks git . --no-banner --redact --verbose --exit-code 1

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Audit Python dependencies (pip-audit)
        run: |
          uv export --locked --no-emit-workspace --format requirements-txt > requirements.txt
          uvx pip-audit --requirement requirements.txt --strict --progress-spinner off

      - name: Audit JS dependencies (npm audit)
        run: npm audit --audit-level=high

  commitlint:
    name: Conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint commit messages in this PR
        run: |
          npx commitlint \
            --from ${{ github.event.pull_request.base.sha }} \
            --to ${{ github.event.pull_request.head.sha }} \
            --verbose
